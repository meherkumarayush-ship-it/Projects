<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prediction Result</title>
<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:0;
}
.card{
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:400px;
}
h1{
  margin-bottom:20px;
}
.pass{
  color:green;
  font-size:28px;
  font-weight:bold;
}
.fail{
  color:red;
  font-size:28px;
  font-weight:bold;
}
a{
  display:inline-block;
  margin-top:20px;
  text-decoration:none;
}
</style>
</head>
<body>

<div class="card">
  <h1>Prediction Result</h1>
  <div id="output"></div>
  <a href="index.html">⬅ Back</a>
</div>

<script>
const prediction = Number(localStorage.getItem("prediction"));
const attendance = localStorage.getItem("attendance");

const output = document.getElementById("output");

if(prediction === 1){
  output.innerHTML =
  `<div class="pass">✅ Student is likely to PASS</div>
   <p>Attendance Ratio: ${attendance}</p>`;
}else{
  output.innerHTML =
  `<div class="fail">❌ Student is likely to FAIL</div>
   <p>Attendance Ratio: ${attendance}</p>`;
}
</script>

</body>
</html>
